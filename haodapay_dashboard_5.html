<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haodapay — Operations Console</title>
<style>
:root{
  --ink:#0B1B33; --slate:#15294A; --mist:#F4F6FB; --line:#E2E7F0;
  --brand:#1F6FEB; --branddk:#1657C2; --teal:#0E9C7D; --amber:#C77A0A;
  --rose:#C53A47; --violet:#6D4AC2; --txt:#1A1A1A; --txt2:#5b6472;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--mist);color:var(--txt);font-size:14px;line-height:1.45}
.mono{font-family:'Courier New',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none}
table{border-collapse:collapse;width:100%}
header{background:var(--ink);color:#fff;position:sticky;top:0;z-index:40}
.topwrap{display:flex;align-items:center;gap:14px;padding:11px 16px;flex-wrap:wrap}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--violet));display:grid;place-items:center;font-weight:700;font-size:18px}
.brandname{font-weight:700;font-size:15px}
.brandsub{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.5px}
.roleswitch{display:flex;gap:4px;background:rgba(255,255,255,.06);border-radius:11px;padding:4px;overflow-x:auto}
.roletab{font-size:12px;font-weight:500;padding:6px 11px;border-radius:8px;color:rgba(255,255,255,.7);white-space:nowrap}
.roletab.active{background:#fff;color:var(--ink);font-weight:600}
.livechip{font-size:11px;color:rgba(255,255,255,.65);background:rgba(255,255,255,.06);padding:6px 10px;border-radius:8px;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--teal);display:inline-block}
.shell{display:flex;min-height:calc(100vh - 56px)}
aside{width:212px;flex-shrink:0;background:#fff;border-right:1px solid var(--line);position:sticky;top:56px;align-self:flex-start;height:calc(100vh - 56px);overflow-y:auto}
.navitem{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:9px;color:var(--txt2);text-align:left;font-size:13px}
.navitem:hover{background:var(--mist)}
.navitem.active{background:rgba(31,111,235,.1);color:var(--brand);font-weight:600}
.navico{width:18px;text-align:center;opacity:.7}
.stagebox{padding:12px 16px;border-top:1px solid var(--line);margin-top:6px}
.stagelabel{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#9aa3b2;margin-bottom:8px}
.stagerow{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--txt2);padding:3px 0}
main{flex:1;min-width:0;padding:22px;overflow-x:hidden}
.rightrail{width:280px;flex-shrink:0;background:#fff;border-left:1px solid var(--line);position:sticky;top:56px;align-self:flex-start;height:calc(100vh - 56px);overflow-y:auto;padding:16px}
h2.page-t{font-size:20px;font-weight:700;color:var(--ink)}
.page-sub{font-size:13px;color:var(--txt2);margin-top:2px;margin-bottom:16px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g5{grid-template-columns:repeat(5,1fr)}
@media(max-width:1100px){.g4,.g5{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}aside{display:none}.rightrail{display:none}}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px}
.stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#9aa3b2;font-weight:600}
.stat .val{font-size:23px;font-weight:700;color:var(--ink);margin-top:5px}
.stat .sub{font-size:11px;margin-top:3px;font-weight:500}
.panel{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.panel-h{padding:13px 16px;border-bottom:1px solid var(--line);font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.tbl-wrap{overflow-x:auto}
table.dt th{font-size:11px;color:#9aa3b2;font-weight:600;text-align:left;padding:10px 14px;border-bottom:1px solid var(--line);background:#fafbfd;white-space:nowrap}
table.dt td{padding:11px 14px;border-bottom:1px solid #eef1f6;font-size:12.5px;white-space:nowrap}
table.dt tr:last-child td{border-bottom:none}
table.dt tr:hover td{background:var(--mist)}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}
.flowbar{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:18px;display:flex;gap:8px;overflow-x:auto;align-items:center}
.fstep{display:flex;align-items:center;gap:9px;flex-shrink:0}
.fnum{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:700;background:#eef1f6;color:#9aa3b2}
.fnum.on{background:var(--brand);color:#fff}
.flabel{font-size:12px;font-weight:500;color:#9aa3b2}.flabel.on{color:var(--ink)}
.farrow{color:#cbd5e1;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:9px 15px;border-radius:9px}
.btn-dark{background:var(--ink);color:#fff}.btn-dark:hover{background:var(--slate)}
.btn-brand{background:var(--brand);color:#fff}.btn-brand:hover{background:var(--branddk)}
.btn-soft{background:var(--mist);color:var(--txt)}
.btn-teal{background:var(--teal);color:#fff}.btn-amber{background:var(--amber);color:#fff}
.btn-sm{font-size:11px;padding:6px 11px;border-radius:8px}
.btn-link{color:var(--brand);font-size:12px;font-weight:600}
.tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;background:#eef1f6;color:var(--txt2)}
.c-teal{color:var(--teal)}.c-amber{color:var(--amber)}.c-rose{color:var(--rose)}.c-brand{color:var(--brand)}.c-violet{color:var(--violet)}.c-ink{color:var(--ink)}.c-mut{color:var(--txt2)}
.p-teal{background:rgba(14,156,125,.12);color:var(--teal)}.p-amber{background:rgba(199,122,10,.12);color:var(--amber)}.p-rose{background:rgba(197,58,71,.12);color:var(--rose)}.p-brand{background:rgba(31,111,235,.12);color:var(--brand)}.p-violet{background:rgba(109,74,194,.12);color:var(--violet)}.p-slate{background:#eef1f6;color:var(--txt2)}
.trail-h{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#9aa3b2;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.trail-item{border-left:2px solid var(--line);padding:0 0 14px 12px;position:relative}
.trail-item:before{content:'';position:absolute;left:-5px;top:3px;width:8px;height:8px;border-radius:50%;background:var(--brand)}
.trail-item.sys:before{background:var(--violet)}.trail-item.warn:before{background:var(--amber)}.trail-item.ok:before{background:var(--teal)}
.trail-time{font-size:10px;color:#9aa3b2;font-family:'Courier New',monospace}
.trail-txt{font-size:12px;color:var(--txt);margin-top:2px}
.trail-meta{font-size:10.5px;color:var(--txt2);margin-top:1px}
.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:16px}
.modal.show{display:flex}
.backdrop{position:absolute;inset:0;background:rgba(11,27,51,.55)}
.modal-box{position:relative;background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.field{margin-bottom:12px}
.field label{font-size:12px;font-weight:600;color:var(--txt2);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:13px;font-family:inherit}
.row2{display:flex;gap:12px;flex-wrap:wrap}.row2>.field{flex:1;min-width:160px}
.calc{background:var(--mist);border-radius:11px;padding:14px}
.calc-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.calc-row.total{border-top:1px solid var(--line);margin-top:5px;padding-top:9px;font-weight:700}
.toast{position:fixed;bottom:22px;right:22px;z-index:60;background:var(--ink);color:#fff;font-size:13px;padding:12px 16px;border-radius:11px;box-shadow:0 10px 30px rgba(0,0,0,.25);display:none;align-items:center;gap:9px;max-width:340px}
.toast.show{display:flex}
.tourbtn{background:linear-gradient(135deg,var(--brand),var(--violet));color:#fff;font-weight:600;font-size:12px;padding:7px 13px;border-radius:9px}
.mobilenav{display:none;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px}
@media(max-width:1100px){.mobilenav{display:flex}}
.mnav-item{flex-shrink:0;font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--txt2);white-space:nowrap}
.mnav-item.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.empty{padding:26px;text-align:center;color:#9aa3b2;font-size:12px}
.lastresult{background:#fff;border:1px solid var(--line);border-left:3px solid var(--teal);border-radius:10px;padding:10px 14px;margin-bottom:16px;display:none;align-items:center;gap:10px;font-size:13px}
.lastresult.show{display:flex}
.lastresult .lr-ic{width:22px;height:22px;border-radius:50%;background:rgba(14,156,125,.15);color:var(--teal);display:grid;place-items:center;flex-shrink:0;font-size:12px}
.trailfab{display:none;position:fixed;bottom:20px;left:20px;z-index:55;background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:11px 16px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.25);align-items:center;gap:8px}
.trailfab .badge{background:var(--brand);border-radius:999px;font-size:11px;padding:1px 7px}
@media(max-width:1100px){
  .trailfab{display:flex}
  .rightrail.drawer{display:block;position:fixed;inset:auto 0 0 0;top:auto;height:72vh;width:100%;z-index:56;border-left:none;border-top:1px solid var(--line);border-radius:18px 18px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
  .drawer-close{display:block}
}
.drawer-close{display:none;width:100%;text-align:center;padding:8px;color:var(--txt2);font-size:12px;font-weight:600;border-bottom:1px solid var(--line);margin-bottom:12px;cursor:pointer}
</style>
</head>

function pill(s){const map={Settled:'p-teal',Active:'p-teal',Verified:'p-teal',Resolved:'p-teal',Met:'p-teal','On Track':'p-brand',Refunded:'p-amber','On Hold':'p-amber',Pending:'p-amber','Merchant Action':'p-brand','In Transit':'p-brand',Chargeback:'p-rose',Suspended:'p-rose',Rejected:'p-rose',Escalated:'p-rose',Breached:'p-rose'};return `<span class="pill ${map[s]||'p-slate'}">${s}</span>`}
function risk(r){return `<span class="pill ${r==='Low'?'p-teal':r==='Medium'?'p-amber':'p-rose'}">${r}</span>`}
function stat(lbl,val,sub,c){return `<div class="card stat"><div class="lbl">${lbl}</div><div class="val">${val}</div><div class="sub c-${c}">${sub}</div></div>`}
function ptitle(t,s){return `<h2 class="page-t">${t}</h2>${s?`<div class="page-sub">${s}</div>`:'<div style="height:12px"></div>'}`}
function flowbar(steps,active){return `<div class="flowbar">${steps.map((s,i)=>`<div class="fstep"><div class="fnum ${i<=active?'on':''}">${i+1}</div><span class="flabel ${i<=active?'on':''}">${s}</span></div>${i<steps.length-1?'<span class="farrow">→</span>':''}`).join('')}</div>`}
function toast(m){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),3000)}
function openModal(h){document.getElementById('modalBox').innerHTML=h;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function log(txt,meta,kind){const now=new Date();const t=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');state.trail.unshift({t,txt,meta:meta||'',kind:kind||''});renderTrail();showResult(txt,meta,kind)}
function showResult(txt,meta,kind){const b=document.getElementById('lastresult');if(!b)return;document.getElementById('lrTxt').innerHTML='<b>'+txt+'</b>'+(meta?' — '+meta:'');const ic=document.getElementById('lrIc');b.style.borderLeftColor=kind==='warn'?'var(--amber)':kind==='sys'?'var(--violet)':'var(--teal)';ic.style.background=kind==='warn'?'rgba(199,122,10,.15)':kind==='sys'?'rgba(109,74,194,.15)':'rgba(14,156,125,.15)';ic.style.color=kind==='warn'?'var(--amber)':kind==='sys'?'var(--violet)':'var(--teal)';ic.textContent=kind==='warn'?'!':kind==='sys'?'i':'✓';b.classList.add('show')}
function renderTrail(){const el=document.getElementById('trail');const badge=document.getElementById('fabBadge');if(badge)badge.textContent=state.trail.length;if(!state.trail.length){el.innerHTML='<div class="empty">Actions you take will be traced here, step by step.</div>';return}el.innerHTML=state.trail.map(i=>`<div class="trail-item ${i.kind}"><div class="trail-time">${i.t}</div><div class="trail-txt">${i.txt}</div>${i.meta?`<div class="trail-meta">${i.meta}</div>`:''}</div>`).join('')}
function clearTrail(){state.trail=[];renderTrail();const b=document.getElementById('lastresult');if(b)b.classList.remove('show')}
function toggleTrail(){document.getElementById('rightrail').classList.toggle('drawer')}
function renderTop(){document.getElementById('roleswitch').innerHTML=Object.keys(NAV).map(r=>`<button class="roletab ${r===role?'active':''}" onclick="setRole('${r}')">${NAV[r].label}</button>`).join('')}
function setRole(r){role=r;page=NAV[r].pages[0][0];renderTop();renderNav();render()}
function renderNav(){const n=NAV[role];document.getElementById('sidebar').innerHTML=n.pages.map(p=>`<button class="navitem ${p[0]===page?'active':''}" onclick="go('${p[0]}')"><span class="navico">${p[1]}</span>${p[2]}</button>`).join('');document.getElementById('mobilenav').innerHTML=n.pages.map(p=>`<button class="mnav-item ${p[0]===page?'active':''}" onclick="go('${p[0]}')">${p[2]}</button>`).join('');document.getElementById('stages').innerHTML=n.stages.map((s,i)=>`<div class="stagerow"><span class="dot" style="background:${i===0?'var(--brand)':'#cbd5e1'}"></span>${s}</div>`).join('')}
function go(p){page=p;renderNav();render()}
function render(){document.getElementById('content').innerHTML=(PAGES[page]||(()=>'<div class="empty">—</div>'))();window.scrollTo({top:0,behavior:'smooth'})}
const PAGES={
 overview(){const tc=state.merchants.reduce((a,m)=>a+m.collected,0),th=state.merchants.reduce((a,m)=>a+m.hold,0),openInv=state.invoices.filter(i=>i.status==='Open').length,q=state.settlements.filter(s=>s.status!=='Done').length;

   ${state.merchants.map(m=>`<tr><td><b>${m.name}</b><div class="c-mut mono" style="font-size:10px">${m.id}</div></td><td class="mono" style="font-size:11px">${m.van}</td><td>${pill(m.kyc)}</td><td><b>${fmt(m.collected)}</b></td><td class="c-amber">${fmt(m.hold)}</td><td>${m.mdfOn?m.mdf+'%':'<span class="c-mut">Off</span>'}</td>

   </tbody></table></div></div>`},
 collections(){

   <div class="panel"><div class="tbl-wrap"><table class="dt"><thead><tr><th>Receipt / Txn</th><th>Merchant</th><th>Payer</th><th>Amount</th><th>Date</th><th>UTR / Ref</th><th>State</th></tr></thead><tbody>
   ${rows.map(r=>{const m=M(r.mid);return `<tr><td class="mono" style="font-size:11px">${r.id}</td><td style="font-size:11px">${m?m.name:'—'}</td><td><b>${r.payer}</b></td><td><b>${fmt(r.amt)}</b></td><td>${r.date}</td><td class="mono" style="font-size:10px">${r.utr||'—'}</td><td>${pill(r.status==='Open'?'In Transit':r.status)}</td></tr>`}).join('')}
   </tbody></table></div></div>`},
 merchants(){return ptitle('Merchants & KYC','Master records, settlement accounts and verification')+`<div class="panel"><div class="tbl-wrap"><table class="dt"><thead><tr><th>Merchant</th><th>Short VAN</th><th>KYC</th><th>Risk</th><th>Settle A/C</th><th>MDF</th><th>Status</th><th></th></tr></thead><tbody>${state.merchants.map(m=>`<tr><td><b>${m.name}</b><div class="c-mut mono" style="font-size:10px">${m.id}</div></td><td class="mono" style="font-size:11px">${m.van}</td><td>${pill(m.kyc)}</td><td>${risk(m.risk)}</td><td class="mono" style="font-size:11px">${m.acc}<div class="c-mut" style="font-size:10px">${m.ifsc}</div></td><td>${m.mdfOn?m.mdf+'%':'<span class="c-mut">Off</span>'}</td><td>${pill(m.status)}</td><td><button class="btn-link" onclick="merchantDetail('${m.id}')">View</button></td></tr>`).join('')}</tbody></table></div></div>`},
 reconcile(){

     </tbody></table></div></div>

     </tbody></table></div></div></div>
   <div class="card" style="margin-top:14px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;${match?'border-color:var(--teal);background:rgba(14,156,125,.04)':partial?'border-color:var(--amber);background:rgba(199,122,10,.04)':''}">

     <div style="margin-left:auto">${match?'<span class="pill p-teal">✓ Totals match</span>':partial?'<span class="pill p-amber">⚠ Difference '+fmt(Math.abs(selInvTot-selRcptTot))+'</span>':'<span class="pill p-slate">Select both sides</span>'}</div>
     <button class="btn ${match?'btn-teal':'btn-soft'}" ${match?'':'disabled style="opacity:.5;cursor:not-allowed"'} onclick="${match?'doReconcile()':''}">Reconcile selected</button>

   <div class="panel" style="margin-top:14px"><div class="panel-h">Reconciled (matched) · ${matched.length}</div><div class="tbl-wrap"><table class="dt"><thead><tr><th>Invoice</th><th>Merchant</th><th>Amount</th><th>Matched receipt</th><th>Status</th></tr></thead><tbody>
   ${matched.map(i=>{const m=M(i.mid);return `<tr><td class="mono" style="font-size:11px">${i.id}</td><td style="font-size:11px">${m?m.name:'—'}</td><td><b>${fmt(i.amt)}</b></td><td class="mono" style="font-size:11px">${i.rcpt||'—'}</td><td>${pill('Settled')}</td></tr>`}).join('')}
   </tbody></table></div></div>`},
 settlement(){const q=state.merchants.filter(m=>m.status==='Active');

 disputes(){return ptitle('Disputes & Holds','Lifecycle with auto-hold and arbitration')+flowbar(['Raised','Merchant Notified','24h Response','Auto-Hold','Arbitration','Resolved'],4)+`<div class="grid g4" style="margin-bottom:18px">${stat('Open Disputes',state.tickets.filter(t=>t.status!=='Resolved').length,'live','rose')}${stat('Funds Held',fmt(state.merchants.reduce((a,m)=>a+m.hold,0)),'across merchants','amber')}${stat('Resolved (30d)','38','94% in SLA','teal')}${stat('Chargeback Rate','0.4%','below 1%','brand')}</div><div class="panel"><div class="tbl-wrap"><table class="dt"><thead><tr><th>Ticket</th><th>Customer</th><th>Merchant</th><th>Type</th><th>Amount</th><th>Stage</th><th>SLA</th><th></th></tr></thead><tbody>${state.tickets.map(t=>{const m=M(t.mid);return `<tr><td class="mono" style="font-size:11px">${t.id}</td><td><b>${t.cust}</b></td><td style="font-size:11px">${m?m.name:'—'}</td><td><span class="tag">${t.type}</span></td><td><b>${fmt(t.amt)}</b></td><td style="font-size:11px">${t.stage}</td><td>${pill(t.sla)}</td><td><button class="btn-link" onclick="disputeModal('${t.id}')">Manage</button></td></tr>`}).join('')}</tbody></table></div></div>`},
 escalation(){return ptitle('Escalation Matrix','Tiered ownership and SLA for every dispute or risk event')+`<div style="display:flex;flex-direction:column;gap:10px">${escalation.map(e=>`<div class="card" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap"><div class="p-${e[5]}" style="width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-weight:700;font-size:14px">${e[0]}</div><div style="flex:1;min-width:120px"><div style="font-size:10px;color:#9aa3b2;font-weight:600">TRIGGER</div><div style="font-weight:600;font-size:13px">${e[1]}</div></div><div style="flex:1;min-width:110px"><div style="font-size:10px;color:#9aa3b2;font-weight:600">OWNER</div><div style="font-size:13px">${e[2]}</div></div><div style="width:90px"><div style="font-size:10px;color:#9aa3b2;font-weight:600">SLA</div><div style="font-size:13px">${e[3]}</div></div><div style="flex:1.5;min-width:160px"><div style="font-size:10px;color:#9aa3b2;font-weight:600">ACTION</div><div style="font-size:12.5px;color:var(--txt2)">${e[4]}</div></div></div>`).join('')}</div><div class="card" style="background:var(--ink);color:#fff;margin-top:16px"><div style="font-weight:700;margin-bottom:6px">Auto-hold rule</div><div style="font-size:13px;color:rgba(255,255,255,.75);line-height:1.6">No merchant action within <b style="color:#fff">24 hours</b> → disputed amount auto-held from next settlement, locked for <b style="color:#fff">15 days</b> (admin-configurable). If resolved for the customer, Haodapay refunds via Single/Bulk Payment and records a chargeback against the merchant.</div></div>`},
 mdf(){return ptitle('MDF / MDR Configuration','Set a platform default, override per merchant, or edit one at a time — always deducted at settlement')
   +`<div class="card" style="margin-bottom:14px"><div style="font-weight:600;margin-bottom:10px">Platform default rate</div>
   <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap"><input id="defMdr" value="${state.mdfDefault}" style="width:90px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;text-align:center;font-weight:700" type="number" step="0.1">
   <span class="c-mut" style="font-size:13px">% — applied to (Collected − Refunds − Chargebacks) at settlement time</span>

   ${state.merchants.map(m=>{const base=m.collected-m.refunds-m.chargebacks;const fee=m.mdfOn?base*m.mdf/100:0;const gst=fee*0.18;
     return `<tr><td><b>${m.name}</b><div class="c-mut mono" style="font-size:10px">${m.id}</div></td>

     <td class="c-mut">${m.mdfOn?fmt(gst):'—'}</td>

   </tbody></table></div></div>
   <div class="card" style="margin-top:14px;background:rgba(109,74,194,.06);border-color:rgba(109,74,194,.2);font-size:13px">

 reports(){return ptitle('Reports','Exportable reference for finance, audit and SBI reconciliation')+`<div class="grid g3">${['Daily Collection','Settlement Report','Chargeback & Hold','MDF Revenue','VAN MIS (SBI)','Bank Reconciliation','GST Summary','Failed Payouts','Audit Trail Export'].map(r=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:600;font-size:13px">${r}</div><div class="c-mut" style="font-size:11px">CSV · PDF · XLSX</div></div><button class="btn-link" onclick="log('Report exported','${r}','ok');toast('${r} generated')">↓ Export</button></div>`).join('')}</div>`},
 m_overview(){const m=state.merchants[0];const mdf=m.mdfOn?(m.collected-m.refunds-m.chargebacks)*m.mdf/100:0;const net=m.collected-m.refunds-m.chargebacks-mdf-m.hold;
   return ptitle(m.name,m.id+' · VAN '+m.van)+flowbar(['Customer Pays','Lands in VAN','Reconciled','MDF Deducted','Settled to You'],3)+`<div class="grid g4" style="margin-bottom:18px">${stat('Collected (MTD)',fmt(m.collected),'this month','teal')}${stat('Available to Settle',fmt(net),'next 17:00','brand')}${stat('On Hold',fmt(m.hold),'disputes','amber')}${stat('Settled (MTD)',fmt(m.settled),'via '+m.mode,'violet')}</div><div class="grid g2"><div class="card"><div style="font-weight:600;margin-bottom:10px">Reconciliation breakdown</div>${[['Money Available',m.collected,'teal'],['Refunded',-m.refunds,'amber'],['Chargeback',-m.chargebacks,'rose'],['MDF Charged',-mdf,'violet'],['On Hold',-m.hold,'amber']].map(r=>`<div class="calc-row"><span class="c-mut">${r[0]}</span><span class="c-${r[2]}"><b>${r[1]<0?'−':''}${fmt(Math.abs(r[1]))}</b></span></div>`).join('')}<div class="calc-row total"><span>Net Settlement</span><span>${fmt(net)}</span></div></div><div class="card"><div style="font-weight:600;margin-bottom:10px">Recent collections</div>${state.txns.filter(t=>t.mid===m.id).map(t=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eef1f6"><div><div style="font-weight:600;font-size:13px">${t.cust}</div><div class="c-mut" style="font-size:11px">${t.svc} · ${t.date}</div></div><div style="text-align:right"><div style="font-weight:600;font-size:13px">${fmt(t.amt)}</div>${pill(t.state)}</div></div>`).join('')}</div></div>`},
 m_collections(){const m=state.merchants[0];return ptitle('Collections','Every payment via your Short VAN, by customer')+`<div class="panel"><div class="tbl-wrap"><table class="dt"><thead><tr><th>Txn</th><th>Customer</th><th>Invoice</th><th>Service</th><th>Amount</th><th>GST</th><th>State</th></tr></thead><tbody>${state.txns.filter(t=>t.mid===m.id).map(t=>`<tr><td class="mono" style="font-size:11px">${t.id}</td><td><b>${t.cust}</b></td><td class="mono" style="font-size:11px">${t.inv}</td><td>${t.svc}</td><td><b>${fmt(t.amt)}</b></td><td class="c-mut">${fmt(t.gst)}</td><td>${pill(t.state)}</td></tr>`).join('')}</tbody></table></div></div>`},
 m_invoices(){const m=state.merchants[0];const rows=state.txns.filter(t=>t.mid===m.id);return ptitle('Invoices & GST','Bill customers and track GST collected')+`<div class="grid" style="grid-template-columns:2fr 1fr"><div class="panel"><div class="panel-h">Issued invoices <button class="btn btn-brand btn-sm" onclick="log('Invoice draft created','','');toast('New invoice draft')">+ New Invoice</button></div><div class="tbl-wrap"><table class="dt"><thead><tr><th>Invoice</th><th>Customer</th><th>Taxable</th><th>GST 18%</th><th>Total</th></tr></thead><tbody>${rows.map(t=>`<tr><td class="mono" style="font-size:11px">${t.inv}</td><td>${t.cust}</td><td>${fmt(t.amt-t.gst)}</td><td class="c-mut">${fmt(t.gst)}</td><td><b>${fmt(t.amt)}</b></td></tr>`).join('')}</tbody></table></div></div><div class="card"><div style="font-weight:600;margin-bottom:8px">GST collected (MTD)</div><div style="font-size:28px;font-weight:700;color:var(--ink)">${fmt(rows.reduce((a,t)=>a+t.gst,0))}</div><div class="c-mut" style="font-size:12px;margin-top:2px">across ${rows.length} invoices</div><button class="btn btn-soft btn-sm" style="margin-top:14px;width:100%" onclick="log('GSTR-1 exported','','ok');toast('GSTR-1 export ready')">↓ Export GSTR-1</button></div></div>`},
 m_settlements(){const rows=state.settlements.filter(s=>s.mid===state.merchants[0].id);return ptitle('Settlement Invoices','Every settlement, itemised like an invoice — base, MDR, GST, net')
   +(rows.length?rows.map(r=>`<div class="card" style="margin-bottom:12px">
   <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div><span class="mono" style="font-size:12px">${r.id}</span><span class="c-mut" style="font-size:11px;margin-left:8px">${r.date}</span></div>${pill(r.status==='Done'?'Settled':r.status)}</div>
   <div class="calc"><div class="calc-row"><span class="c-mut">Amount received in VAN</span><span><b>${fmt(r.gross)}</b></span></div>
   <div class="calc-row"><span class="c-mut">Less refunds</span><span class="c-amber">− ${fmt(r.refunds||0)}</span></div>
   <div class="calc-row"><span class="c-mut">Less chargebacks</span><span class="c-rose">− ${fmt(r.chargebacks||0)}</span></div>
   <div class="calc-row" style="border-top:1px dashed var(--line);margin-top:4px;padding-top:8px"><span class="c-mut">Settlement base</span><span><b>${fmt(r.base)}</b></span></div>
   <div class="calc-row"><span class="c-mut">MDR (${r.mdr}%)</span><span class="c-violet">− ${fmt(r.mdf)}</span></div>
   <div class="calc-row"><span class="c-mut">GST on MDR (18%)</span><span class="c-mut">− ${fmt(r.gst)}</span></div>
   <div class="calc-row total"><span>Final amount settled</span><span>${fmt(r.net)}</span></div></div>
   <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px"><div style="font-size:11px"><span class="pill p-brand">${r.mode}</span> <span class="c-mut mono">UTR ${r.utr}</span></div><button class="btn-link" onclick="toast('Invoice PDF downloaded')">↓ Download invoice</button></div></div>`).join(''):'<div class="empty">No settlements yet — run one from Admin → Settlement Pipeline.</div>')},
 m_notifications(){const m=state.merchants[0];return ptitle('Notifications','MDR changes, settlements and account updates')
   +(m.notif.length?`<div style="display:flex;flex-direction:column;gap:10px">${m.notif.map(n=>`<div class="card" style="display:flex;gap:12px;align-items:start;border-left:3px solid ${n.kind==='warn'?'var(--amber)':n.kind==='ok'?'var(--teal)':'var(--brand)'}"><div class="pill p-${n.kind==='warn'?'amber':n.kind==='ok'?'teal':'brand'}" style="width:26px;height:26px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;padding:0">${n.kind==='warn'?'!':n.kind==='ok'?'✓':'i'}</div><div><div style="font-size:13px">${n.txt}</div><div class="c-mut" style="font-size:11px;margin-top:3px">${n.t}</div></div></div>`).join('')}</div>`:'<div class="empty">No notifications yet.</div>')},
 m_disputes(){const md=state.tickets.filter(t=>t.mid===state.merchants[0].id);return ptitle('Disputes & Holds','Respond within 24h to avoid an auto-hold')+`<div class="grid g4" style="margin-bottom:18px">${stat('Pending',md.filter(t=>t.status==='Merchant Action').length,'awaiting you','amber')}${stat('Held Amount',fmt(state.merchants[0].hold),'15-day lock','rose')}${stat('CB Refunded',fmt(3200),'this month','violet')}${stat('Resolved','12','in your favour 9','teal')}</div><div class="panel"><div class="tbl-wrap"><table class="dt"><thead><tr><th>Ticket</th><th>Customer</th><th>Reason</th><th>Amount</th><th>Stage</th><th></th></tr></thead><tbody>${md.length?md.map(t=>`<tr><td class="mono" style="font-size:11px">${t.id}</td><td><b>${t.cust}</b></td><td style="font-size:11px;max-width:200px;white-space:normal">${t.reason}</td><td><b>${fmt(t.amt)}</b></td><td style="font-size:11px">${t.stage}</td><td><button class="btn btn-dark btn-sm" onclick="merchantRespondModal('${t.id}')">Respond</button></td></tr>`).join(''):'<tr><td colspan="6" class="empty">No disputes for this merchant.</td></tr>'}</tbody></table></div></div>`},
 m_account(){const m=state.merchants[0];return ptitle('Settlement Account','Where Haodapay sends your money — penny-drop verified')+`<div class="grid g2"><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-weight:600">Bank account</div><span class="pill p-teal">✓ verified</span></div>${[['Account holder',m.name],['Account number',m.acc],['IFSC',m.ifsc],['Bank',m.bank],['Default mode',m.mode]].map(r=>`<div class="calc-row"><span class="c-mut">${r[0]}</span><span class="mono"><b>${r[1]}</b></span></div>`).join('')}</div><div class="card"><div style="font-weight:600;margin-bottom:10px">Preferred payout mode</div>${[['NEFT','Within 2 hours'],['RTGS','24×7, ≥₹2L'],['IMPS','Instant, up to ₹2L']].map(r=>`<button onclick="state.merchants[0].mode='${r[0]}';log('Merchant changed payout mode','→ ${r[0]}','');toast('Mode set: ${r[0]}');render()" style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:11px;border-radius:9px;border:1px solid ${m.mode===r[0]?'var(--brand)':'var(--line)'};background:${m.mode===r[0]?'rgba(31,111,235,.05)':'#fff'};margin-bottom:8px;text-align:left"><div><div style="font-weight:600;font-size:13px">${r[0]}</div><div class="c-mut" style="font-size:11px">${r[1]}</div></div><span style="width:16px;height:16px;border-radius:50%;border:2px solid ${m.mode===r[0]?'var(--brand)':'#cbd5e1'};background:${m.mode===r[0]?'var(--brand)':'#fff'}"></span></button>`).join('')}</div></div>`},
 c_overview(){return ptitle('My Payments','Payments you made through Haodapay merchants')+`<div class="panel"><div class="tbl-wrap"><table class="dt"><thead><tr><th>Txn</th><th>Merchant</th><th>Service</th><th>Amount</th><th>Date</th><th>Status</th><th></th></tr></thead><tbody>${state.txns.slice(0,4).map(t=>{const m=M(t.mid);return `<tr><td class="mono" style="font-size:11px">${t.id}</td><td>${m?m.name:'—'}</td><td>${t.svc}</td><td><b>${fmt(t.amt)}</b></td><td>${t.date}</td><td>${pill(t.state)}</td><td><button class="btn-link" onclick="go('c_dispute')">Dispute</button></td></tr>`}).join('')}</tbody></table></div></div>`},
 c_dispute(){return ptitle('Raise a Dispute','Your merchant has 24 hours to respond')+`<div class="card" style="max-width:620px"><div class="row2"><div class="field"><label>Transaction ID</label><input id="f_txn" value="TXN-88404"></div><div class="field"><label>Disputed amount (₹)</label><input id="f_amt" value="8900"></div></div><div class="row2"><div class="field"><label>Your name</label><input id="f_name" value="Neha Verma"></div><div class="field"><label>Phone</label><input id="f_phone" value="+91 98••••4471"></div></div><div class="field"><label>Email</label><input id="f_email" value="neha•••@mail.com"></div><div class="field"><label>Dispute type</label><select id="f_type"><option>Non-delivery</option><option>Refund request</option><option>Product quality</option><option>Unauthorized / fraud</option></select></div><div class="field"><label>What happened?</label><textarea id="f_reason" rows="3">Order never arrived and the kitchen isn't responding.</textarea></div><button class="btn btn-dark" onclick="raiseTicket()">Submit dispute</button></div>`},
 c_tickets(){const ct=state.tickets.filter(t=>t.cust==='Neha Verma'||t._mine);return ptitle('My Tickets','Track disputes you have raised')+(ct.length?`<div style="display:flex;flex-direction:column;gap:10px">${ct.map(t=>{const step=t.status==='Resolved'?3:(t.status==='Escalated'||t.status==='On Hold')?2:1;return `<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="mono c-mut" style="font-size:12px">${t.id}</span>${pill(t.status)}</div><div style="font-weight:600">${t.type} · ${fmt(t.amt)}</div><div class="c-mut" style="font-size:12px">${t.txn}</div><div style="display:flex;gap:8px;align-items:center;margin-top:10px;font-size:11px;flex-wrap:wrap">${['Raised','Merchant','Review','Resolved'].map((s,i)=>`<span style="display:flex;align-items:center;gap:6px"><span class="dot" style="background:${i<=step?'var(--brand)':'#cbd5e1'}"></span><span style="color:${i<=step?'var(--ink)':'#9aa3b2'};font-weight:${i<=step?'600':'400'}">${s}</span></span>${i<3?'<span class="c-mut">—</span>':''}`).join('')}</div></div>`}).join('')}</div>`:'<div class="empty">No tickets yet. Raise one from “Raise a Dispute”.</div>')},
 s_queue(){return ptitle('Ticket Queue','Open issues prioritised by SLA risk')+`<div class="grid g4" style="margin-bottom:18px">${stat('Open',state.tickets.filter(t=>t.status!=='Resolved').length,'live','rose')}${stat('Awaiting Merchant',state.tickets.filter(t=>t.status==='Merchant Action').length,'24h clock','amber')}${stat('Escalated',state.tickets.filter(t=>t.status==='Escalated').length,'to coordinator','violet')}${stat('Avg Resolution','1.8d','target 3d','teal')}</div><div class="panel"><div class="tbl-wrap"><table class="dt"><thead><tr><th>Ticket</th><th>Customer</th><th>Merchant</th><th>Type</th><th>Amount</th><th>SLA</th><th></th></tr></thead><tbody>${state.tickets.map(t=>{const m=M(t.mid);return `<tr><td class="mono" style="font-size:11px">${t.id}</td><td><b>${t.cust}</b></td><td style="font-size:11px">${m?m.name:'—'}</td><td><span class="tag">${t.type}</span></td><td><b>${fmt(t.amt)}</b></td><td>${pill(t.sla)}</td><td><button class="btn-link" onclick="disputeModal('${t.id}')">Open</button></td></tr>`}).join('')}</tbody></table></div></div>`},
 s_escalation(){return PAGES.escalation()},
 s_lookup(){return ptitle('Transaction Lookup','Find any payment, VAN or customer')+`<div class="card" style="max-width:620px"><div style="display:flex;gap:8px"><input id="lookupVal" placeholder="TXN ID, VAN, phone, email or name…" style="flex:1;border:1px solid var(--line);border-radius:9px;padding:10px 13px;font-size:13px"><button class="btn btn-dark" onclick="doLookup()">⌕ Search</button></div><div id="lookupResult" style="margin-top:14px"></div></div>`},
 cp_overview(){return ptitle('Risk Overview','Real-time AML/CFT posture')+`<div class="grid g4" style="margin-bottom:18px">${stat('Risk Score','Low','22/100','teal')}${stat('Open Alerts','2','1 high','rose')}${stat('High-risk Merchants','0','—','teal')}${stat('SAR Filed (30d)','2','to FIU-IND','violet')}</div><div class="panel"><div class="panel-h">Velocity & threshold flags</div>${[['Nimbus Cloud Kitchen','Multiple refunds same payer','Medium','amber'],['Verde Organics','New beneficiary added','Low','teal'],['Lotus Wellness','Within normal range','Low','teal']].map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #eef1f6"><div><div style="font-weight:600;font-size:13px">${r[0]}</div><div class="c-mut" style="font-size:11px">${r[1]}</div></div><span class="pill p-${r[3]}">${r[2]}</span></div>`).join('')}</div>`},
 cp_monitor(){return ptitle('Transaction Monitoring','Automated screening on every flow')+`<div class="panel"><div class="tbl-wrap"><table class="dt"><thead><tr><th>Txn</th><th>Merchant</th><th>Amount</th><th>Risk</th><th>Flag</th></tr></thead><tbody>${state.txns.map((t,i)=>{const m=M(t.mid);const sc=[8,12,15,38,22,9][i];const f=sc>50?['High','rose']:sc>30?['Watch','amber']:['Clear','teal'];return `<tr><td class="mono" style="font-size:11px">${t.id}</td><td style="font-size:12px">${m?m.name:'—'}</td><td><b>${fmt(t.amt)}</b></td><td>${sc}/100</td><td><span class="pill p-${f[1]}">${f[0]}</span></td></tr>`}).join('')}</tbody></table></div></div>`},
 cp_aml(){return ptitle('AML Alerts','Cases requiring review')+`<div style="display:flex;flex-direction:column;gap:10px">${[['ALT-770','Nimbus Cloud Kitchen','Structuring — repeated sub-threshold refunds','Medium','Under review'],['ALT-768','Customer 98••4471','Same payer disputing across merchants','Low','Monitoring']].map(a=>`<div class="card" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap"><div style="width:90px"><div class="mono c-mut" style="font-size:11px">${a[0]}</div><span class="pill p-${a[3]==='Medium'?'amber':'teal'}" style="margin-top:4px">${a[3]}</span></div><div style="flex:1;min-width:160px"><div style="font-weight:600;font-size:13px">${a[1]}</div><div class="c-mut" style="font-size:12px">${a[2]}</div></div><div style="font-size:12px;color:var(--txt2)">${a[4]}</div><button class="btn-link" onclick="toast('Case ${a[0]} opened')">Review →</button></div>`).join('')}</div>`},
 k_queue(){return ptitle('KYC Review Queue','Verify documents before a merchant goes live')+`<div style="display:flex;flex-direction:column;gap:10px">${state.merchants.map(m=>`<div class="card" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap"><div style="display:flex;align-items:center;gap:12px;min-width:230px"><div style="width:40px;height:40px;border-radius:10px;background:var(--mist);display:grid;place-items:center;font-weight:700;color:#9aa3b2">${m.name[0]}</div><div><div style="font-weight:600;font-size:13px">${m.name}</div><div class="c-mut mono" style="font-size:11px">${m.id}</div></div></div><div style="display:flex;gap:6px;flex-wrap:wrap">${['PAN','Aadhaar','GST','Bank'].map(d=>`<span class="pill p-teal">✓ ${d}</span>`).join('')}</div><div style="margin-left:auto;display:flex;align-items:center;gap:8px">${pill(m.kyc)}${m.kyc==='Pending'?`<button class="btn btn-teal btn-sm" onclick="approveKyc('${m.id}')">Approve</button><button class="btn btn-soft btn-sm" onclick="toast('${m.name} queried')">Query</button>`:''}</div></div>`).join('')}</div>`},
 k_expiry(){return ptitle('Expiry Tracker','Documents and re-verifications coming due')+`<div class="panel"><div class="tbl-wrap"><table class="dt"><thead><tr><th>Merchant</th><th>Document</th><th>Expires</th><th>Days left</th><th></th></tr></thead><tbody>${[['Lotus Wellness','GST Certificate','12 Aug 2026',46,'teal'],['Verde Organics','PAN re-KYC','03 Jul 2026',6,'amber'],['Stride Footwear','Bank mandate','28 Jun 2026',1,'rose']].map(r=>`<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td>${r[2]}</td><td><span class="pill p-${r[4]}">${r[3]}d</span></td><td><button class="btn-link" onclick="toast('Reminder sent')">Remind</button></td></tr>`).join('')}</tbody></table></div></div>`},
 a_trail(){const base=[['27 Jun 11:20','admin.kamran','Admin','Initiated settlement','STL-9920 · ₹44,296'],['27 Jun 10:45','kyc.priya','KYC','Approved merchant','MID-2042'],['27 Jun 09:30','system','Auto','Applied auto-hold','MID-2043 · ₹9,300'],['26 Jun 18:02','admin.kamran','Admin','Edited MDF rate','MID-2041 · 2.0%']];const live=state.trail.map(i=>['now',role,NAV[role].label,i.txt,i.meta]);return ptitle('Audit Log','Immutable record · 7-year retention')+`<div class="panel"><div class="tbl-wrap"><table class="dt"><thead><tr><th>Time</th><th>Actor</th><th>Role</th><th>Action</th><th>Object</th></tr></thead><tbody>${live.concat(base).map(r=>`<tr><td class="mono" style="font-size:11px">${r[0]}</td><td><b>${r[1]}</b></td><td><span class="tag">${r[2]}</span></td><td>${r[3]}</td><td class="mono" style="font-size:11px">${r[4]}</td></tr>`).join('')}</tbody></table></div></div><div class="c-mut" style="font-size:11px;margin-top:8px">Live actions from this session appear at the top, then seeded history.</div>`},
 a_recon(){return ptitle('Bank Reconciliation','Haodapay ledger vs SBI statement')+`<div class="grid g4" style="margin-bottom:18px">${stat('Matched','99.7%','1,204 entries','teal')}${stat('Unmatched','3','under review','amber')}${stat('Variance',fmt(0),'tied out','teal')}${stat('Last run','11:00','hourly','brand')}</div><div class="panel"><div class="tbl-wrap"><table class="dt"><thead><tr><th>SBI Ref</th><th>Type</th><th>App Amount</th><th>Bank Amount</th><th>Match</th></tr></thead><tbody>${[['VAN-MIS-9921','Collection',5400],['STL-9920','Payout',44296],['STL-9911','Payout',38122],['VAN-MIS-9844','Collection',8900]].map(r=>`<tr><td class="mono" style="font-size:11px">${r[0]}</td><td>${r[1]}</td><td>${fmt(r[2])}</td><td>${fmt(r[2])}</td><td><span class="pill p-teal">✓ Matched</span></td></tr>`).join('')}</tbody></table></div></div>`},
 ac_pnl(){const mdf=state.merchants.reduce((a,m)=>a+(m.mdfOn?(m.collected-m.refunds-m.chargebacks)*m.mdf/100:0),0);const cb=state.merchants.reduce((a,m)=>a+m.chargebacks,0);return ptitle('P&L Summary','Profit from MDF and chargebacks')+`<div class="grid g4" style="margin-bottom:18px">${stat('Gross Collected',fmt(state.merchants.reduce((a,m)=>a+m.collected,0)),'today','teal')}${stat('MDF Income',fmt(mdf),'revenue','violet')}${stat('Chargeback Cost',fmt(cb),'expense','rose')}${stat('Net Margin',fmt(mdf-cb),'after CB','brand')}</div><div class="card"><div style="font-weight:600;margin-bottom:10px">Revenue waterfall</div>${[['MDF fees collected',mdf,'teal'],['Less: chargeback losses',-cb,'rose'],['Net contribution',mdf-cb,'ink']].map(r=>`<div class="calc-row ${r[2]==='ink'?'total':''}"><span class="c-mut">${r[0]}</span><span class="c-${r[2]}"><b>${r[1]<0?'−':''}${fmt(Math.abs(r[1]))}</b></span></div>`).join('')}</div>`},
 ac_gl(){return ptitle('General Ledger','Auto-posted journal entries')+`<div class="panel"><div class="tbl-wrap"><table class="dt"><thead><tr><th>Entry</th><th>Account</th><th>Debit</th><th>Credit</th><th>Ref</th></tr></thead><tbody>${[['JE-5521','Customer Collections (VAN)','5,400','','TXN-88401'],['JE-5521','Merchant Payable','','5,400','MID-2041'],['JE-5530','Merchant Payable','44,296','','STL-9920'],['JE-5530','Bank — SBI Current','','44,296','UTR…012'],['JE-5531','MDF Income','','904','MID-2041']].map(r=>`<tr><td class="mono" style="font-size:11px">${r[0]}</td><td>${r[1]}</td><td class="mono">${r[2]?'₹'+r[2]:''}</td><td class="mono">${r[3]?'₹'+r[3]:''}</td><td class="mono c-mut" style="font-size:10px">${r[4]}</td></tr>`).join('')}</tbody></table></div></div>`},
 ac_tax(){return ptitle('GST & Tax','Tax on merchant services and Haodapay fees')+`<div class="grid g3" style="margin-bottom:18px">${stat('GST on MDF (18%)',fmt(4024),'Haodapay liability','violet')}${stat('Merchant GST',fmt(207099),'pass-through','brand')}${stat('TDS',fmt(0),'n/a','teal')}</div><div class="card" style="font-size:13px"><b>Note:</b> GST on merchant services is collected in the merchant's name and passed through at settlement. Haodapay charges GST only on its MDF fee.<button class="btn btn-soft btn-sm" style="display:block;margin-top:12px" onclick="log('Tax pack exported','','ok');toast('Tax pack exported')">↓ Export tax pack</button></div>`},
};
function merchantDetail(id){const m=M(id);openModal(`<div style="padding:22px"><div style="display:flex;justify-content:space-between;margin-bottom:16px"><div style="font-weight:700;font-size:17px">${m.name}</div><button onclick="closeModal()" style="font-size:20px;color:#9aa3b2">✕</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">${[['Short VAN',m.van],['KYC',m.kyc],['Risk',m.risk],['Settle A/C',m.acc],['IFSC',m.ifsc],['MDF',m.mdfOn?m.mdf+'%':'Off'],['Mode',m.mode],['Status',m.status]].map(r=>`<div><div class="c-mut" style="font-size:11px">${r[0]}</div><div style="font-weight:600">${r[1]}</div></div>`).join('')}</div><div class="calc" style="margin-top:16px">${[['Collected',m.collected],['Refunds',m.refunds],['Chargebacks',m.chargebacks],['Hold',m.hold],['Settled',m.settled]].map(r=>`<div class="calc-row"><span class="c-mut">${r[0]}</span><b>${fmt(r[1])}</b></div>`).join('')}</div><button class="btn btn-dark" style="margin-top:16px;width:100%" onclick="closeModal();go('settlement')">Go to settlement →</button></div>`)}
function settleModal(id){const m=M(id);const base=m.collected-m.refunds-m.chargebacks;const mdf=m.mdfOn?base*m.mdf/100:0;const gst=mdf*0.18;const net=base-mdf-gst;window._mode=m.mode;openModal(`<div style="padding:22px"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><div style="font-weight:700;font-size:17px">Settle · ${m.name}</div><button onclick="closeModal()" style="font-size:20px;color:#9aa3b2">✕</button></div>
<div class="calc"><div class="calc-row"><span class="c-mut">Amount received in VAN</span><span><b>${fmt(m.collected)}</b></span></div>
<div class="calc-row"><span class="c-mut">Less refunds</span><span class="c-amber">− ${fmt(m.refunds)}</span></div>
<div class="calc-row"><span class="c-mut">Less chargebacks</span><span class="c-rose">− ${fmt(m.chargebacks)}</span></div>
<div class="calc-row" style="border-top:1px dashed var(--line);margin-top:4px;padding-top:8px"><span class="c-mut">Settlement base</span><span><b>${fmt(base)}</b></span></div>
<div class="calc-row"><span class="c-mut">MDR charge (${m.mdf}%)</span><span class="c-violet">− ${fmt(mdf)}</span></div>
<div class="calc-row"><span class="c-mut">GST on MDR (18%)</span><span class="c-mut">− ${fmt(gst)}</span></div>
<div class="calc-row total"><span>Final amount settled</span><span>${fmt(net)}</span></div></div>
<div style="margin-top:14px"><div style="font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:6px">Payment mode</div><div style="display:flex;gap:8px">${['NEFT','RTGS','IMPS'].map(md=>`<button class="pmode" data-m="${md}" onclick="pickMode('${md}')" style="flex:1;padding:9px;border-radius:9px;border:${md===m.mode?'2px solid var(--brand)':'1px solid var(--line)'};background:${md===m.mode?'rgba(31,111,235,.06)':'#fff'};font-weight:${md===m.mode?'600':'400'};font-size:13px">${md}</button>`).join('')}</div></div><div style="margin-top:14px"><button id="otpBtn" class="btn" style="width:100%;background:rgba(199,122,10,.12);color:var(--amber)" onclick="document.getElementById('otpRow').style.display='block';this.style.display='none'">🔐 Send 2FA OTP to admin device</button><div id="otpRow" style="display:none;margin-top:10px"><input id="otpVal" placeholder="Enter 6 digits (any)" style="width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;text-align:center;letter-spacing:4px;font-family:monospace"></div></div><div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-soft" style="flex:1" onclick="closeModal()">Cancel</button><button class="btn btn-dark" style="flex:1" onclick="confirmSettle('${id}')">Approve payout</button></div></div>`);log('Opened settlement for '+m.name,'Net '+fmt(net)+' · '+m.mode,'sys')}
function pickMode(md){window._mode=md;document.querySelectorAll('.pmode').forEach(b=>{const on=b.dataset.m===md;b.style.border=on?'2px solid var(--brand)':'1px solid var(--line)';b.style.background=on?'rgba(31,111,235,.06)':'#fff';b.style.fontWeight=on?'600':'400'})}
function confirmSettle(id){const otp=document.getElementById('otpVal');if(!otp||otp.value.replace(/\D/g,'').length<6){toast('Enter the 6-digit OTP to authorise');return}const m=M(id);const base=m.collected-m.refunds-m.chargebacks;const mdf=m.mdfOn?base*m.mdf/100:0;const gst=mdf*0.18;const net=Math.round(base-mdf-gst);const utr='SBIN0H'+Math.floor(90000+Math.random()*9999);
const stl={id:'STL-'+(9921+state.settlements.length),mid:m.id,date:'27 Jun '+(new Date().getHours())+':'+String(new Date().getMinutes()).padStart(2,'0'),gross:m.collected,refunds:m.refunds,chargebacks:m.chargebacks,base:Math.round(base),mdr:m.mdf,mdf:Math.round(mdf),gst:Math.round(gst),net,mode:window._mode,utr,status:'Done'};
state.settlements.unshift(stl);m.settled+=net;m.collected=0;m.refunds=0;m.chargebacks=0;closeModal();
m.notif.unshift({t:'27 Jun',txt:'Settlement '+stl.id+' processed: '+fmt(net)+' sent via '+window._mode+' (UTR '+utr+'). View invoice in Settlement Invoices.',kind:'ok'});
log('✅ Payout sent to '+m.name,fmt(net)+' via '+window._mode+' · UTR '+utr,'ok');toast('Payout '+fmt(net)+' sent · UTR '+utr);render()}
function disputeModal(id){const t=state.tickets.find(x=>x.id===id);const m=M(t.mid);openModal(`<div style="padding:22px"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><div><div style="font-weight:700;font-size:17px">${t.id}</div><div class="c-mut" style="font-size:12px">${t.type} · ${fmt(t.amt)}</div></div><button onclick="closeModal()" style="font-size:20px;color:#9aa3b2">✕</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;margin-bottom:14px">${[['Customer',t.cust],['Merchant',m?m.name:'—'],['Transaction',t.txn],['Created',t.created],['Stage',t.stage],['SLA',t.sla]].map(r=>`<div><div class="c-mut" style="font-size:11px">${r[0]}</div><div style="font-weight:600">${r[1]}</div></div>`).join('')}</div><div class="calc" style="margin-bottom:14px"><b>Reason:</b> ${t.reason}</div><div style="display:flex;gap:8px"><button class="btn btn-teal" style="flex:1" onclick="resolveDispute('${id}','refund')">Approve refund</button><button class="btn btn-amber" style="flex:1" onclick="resolveDispute('${id}','hold')">Hold funds</button><button class="btn btn-soft" style="flex:1" onclick="resolveDispute('${id}','reject')">Reject</button></div></div>`)}
function resolveDispute(id,action){const t=state.tickets.find(x=>x.id===id);const m=M(t.mid);if(action==='refund'){t.status='Resolved';t.stage='Refunded';t.sla='Met';if(m){m.chargebacks+=t.amt;if(m.hold>=t.amt)m.hold-=t.amt;m.notif.unshift({t:'27 Jun',txt:"Dispute "+t.id+" resolved in customer's favour. "+fmt(t.amt)+" recorded as a chargeback against your account.",kind:'warn'})}log('✅ Refund approved · '+t.id,fmt(t.amt)+' to '+t.cust+' via IMPS','ok');toast('Refund '+fmt(t.amt)+' sent to '+t.cust)}else if(action==='hold'){t.status='On Hold';t.stage='Funds Held (15d)';if(m){m.hold+=t.amt;m.notif.unshift({t:'27 Jun',txt:fmt(t.amt)+' has been held for 15 days pending dispute '+t.id+'.',kind:'warn'})}log('⏸ Funds held · '+t.id,fmt(t.amt)+' locked 15 days','warn');toast(fmt(t.amt)+' held for 15 days')}else{t.status='Resolved';t.stage='Rejected (proof)';t.sla='Met';if(m){if(m.hold>=t.amt)m.hold-=t.amt;m.notif.unshift({t:'27 Jun',txt:'Dispute '+t.id+' was rejected with your proof. Held amount released.',kind:'ok'})}log('Dispute rejected · '+t.id,'released to merchant','');toast(t.id+' rejected with proof')}closeModal();render()}
function merchantRespondModal(id){const t=state.tickets.find(x=>x.id===id);openModal(`<div style="padding:22px"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><div style="font-weight:700;font-size:17px">Respond · ${t.id}</div><button onclick="closeModal()" style="font-size:20px;color:#9aa3b2">✕</button></div><div class="card" style="background:rgba(197,58,71,.06);border-color:rgba(197,58,71,.2);color:var(--rose);font-size:12.5px;margin-bottom:12px">⏱ Respond within 24h or ${fmt(t.amt)} will be auto-held from your next settlement.</div><div class="calc" style="margin-bottom:12px"><b>Customer says:</b> ${t.reason}</div><textarea rows="3" placeholder="Your response with evidence…" style="width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font-family:inherit;margin-bottom:12px"></textarea><div style="display:flex;gap:8px"><button class="btn btn-teal" style="flex:1" onclick="merchantRespond('${id}','approve')">Approve refund</button><button class="btn btn-dark" style="flex:1" onclick="merchantRespond('${id}','reject')">Reject with proof</button></div></div>`)}
function merchantRespond(id,action){const t=state.tickets.find(x=>x.id===id);const m=M(t.mid);if(action==='approve'){t.status='Resolved';t.stage='Refunded';t.sla='Met';if(m){m.chargebacks+=t.amt;if(m.hold>=t.amt)m.hold-=t.amt}log('Merchant approved refund · '+t.id,fmt(t.amt)+' to '+t.cust,'ok');toast('Approved — refund will be issued')}else{t.status='Escalated';t.stage='Haodapay Review';log('Merchant rejected · '+t.id,'escalated to Haodapay','warn');toast('Rejected — escalated to Haodapay')}closeModal();render()}
function raiseTicket(){const g=id=>{const e=document.getElementById(id);return e?e.value:''};const amt=parseInt((g('f_amt')||'0').replace(/\D/g,''))||0;const n=state.tickets.filter(t=>t.id.indexOf('DSP')===0).length;const id='DSP-'+(3305+n);state.tickets.unshift({id,cust:g('f_name')||'Customer',mid:'MID-2043',txn:g('f_txn')||'TXN-—',amt,type:g('f_type')||'Non-delivery',reason:g('f_reason')||'—',status:'Merchant Action',stage:'Awaiting Merchant',sla:'On Track',created:'27 Jun now',_mine:true});log('🎫 Dispute raised · '+id,g('f_name')+' · '+fmt(amt)+' · merchant notified (24h SLA)','sys');toast('Dispute '+id+' created · merchant notified');go('c_tickets')}
function toggleMdf(id){const m=M(id);m.mdfOn=!m.mdfOn;m.notif.unshift({t:'27 Jun',txt:'MDR collection has been turned '+(m.mdfOn?'ON':'OFF')+' for your account.',kind:m.mdfOn?'ok':'warn'});log('MDR '+(m.mdfOn?'enabled':'disabled')+' · '+m.name,'','');toast('MDR '+(m.mdfOn?'on':'off')+' for '+m.name);render()}
function setDefaultMdr(){const v=parseFloat(document.getElementById('defMdr').value)||0;state.mdfDefault=v;log('Platform default MDR set','→ '+v+'%','sys');toast('Default MDR set to '+v+'% (does not change existing merchant rates until applied)')}
function applyDefaultToAll(){const v=state.mdfDefault;state.merchants.forEach(m=>{const changed=m.mdf!==v;m.mdf=v;if(changed)m.notif.unshift({t:'27 Jun',txt:'Your MDR rate has been changed to '+v+'%.',kind:'warn'})});log('Default MDR applied to all merchants','→ '+v+'% · '+state.merchants.length+' merchants notified','sys');toast('Applied '+v+'% to all merchants — each notified');render()}
function setMerchantMdr(id,val){const v=parseFloat(val);if(isNaN(v))return;const m=M(id);if(v===m.mdf)return;m.mdf=v;m.notif.unshift({t:'27 Jun',txt:'Your MDR rate has been changed to '+v+'%.',kind:'warn'});log('MDR changed · '+m.name,'→ '+v+'% · merchant notified','sys');toast(m.name+' MDR set to '+v+'% — merchant notified');render()}
function saveMdrRow(id){const input=[...document.querySelectorAll('.mdrInput')].find(i=>i.dataset.mid===id);if(input)setMerchantMdr(id,input.value)}
function approveKyc(id){const m=M(id);m.kyc='Verified';if(m.status==='On Hold')m.status='Active';log('✅ KYC approved · '+m.name,'merchant activated','ok');toast(m.name+' approved & activated');render()}
function setColFilter(k,v){window._colFilter=window._colFilter||{mid:'all',date:'all'};window._colFilter[k]=v;render()}
function toggleRec(side,id){if(side==='inv'){recSelInv=recSelInv.includes(id)?recSelInv.filter(x=>x!==id):[...recSelInv,id]}else{recSelRcpt=recSelRcpt.includes(id)?recSelRcpt.filter(x=>x!==id):[...recSelRcpt,id]}render()}
function doReconcile(partial){
  if(!recSelInv.length||!recSelRcpt.length){toast('Select at least one bill and one receipt');return}
  const invs=recSelInv.map(id=>state.invoices.find(i=>i.id===id));
  const rcpts=recSelRcpt.map(id=>state.receipts.find(r=>r.id===id));
  const invTot=invs.reduce((a,i)=>a+i.amt,0), rcptTot=rcpts.reduce((a,r)=>a+r.amt,0);
  invs.forEach(i=>{i.status='Matched';i.rcpt=rcpts.map(r=>r.id).join(', ')});
  rcpts.forEach(r=>{r.status='Matched';r.invs=invs.map(i=>i.id)});
  log((partial?'⚠ Partial reconciliation':'✅ Reconciled')+' · '+invs.length+' bill(s) ↔ '+rcpts.length+' receipt(s)',fmt(invTot)+' billed vs '+fmt(rcptTot)+' received',partial?'warn':'ok');
  toast((partial?'Partially reconciled — variance logged':'Reconciled')+': '+invs.map(i=>i.id).join(', ')+' ↔ '+rcpts.map(r=>r.id).join(', '));
  recSelInv=[];recSelRcpt=[];render();
}
function createInvoiceModal(){
  openModal(`<div style="padding:22px"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><div style="font-weight:700;font-size:17px">Create Invoice (Bill)</div><button onclick="closeModal()" style="font-size:20px;color:#9aa3b2">✕</button></div>
  <div class="field"><label>Merchant</label><select id="ni_mid">${state.merchants.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div>
  <div class="row2"><div class="field"><label>Customer name</label><input id="ni_cust" value="New Customer"></div><div class="field"><label>Amount (₹)</label><input id="ni_amt" value="5000" type="number"></div></div>
  <div class="card" style="background:rgba(31,111,235,.05);border-color:rgba(31,111,235,.2);font-size:12px;margin-bottom:14px">Bill is raised first. Payment can arrive after — or you can attach an already-received older payment to this bill from the Reconciliation screen.</div>
  <button class="btn btn-dark" style="width:100%" onclick="createInvoice()">Create bill</button></div>`);
}
function createInvoice(){
  const mid=document.getElementById('ni_mid').value;const cust=document.getElementById('ni_cust').value||'Customer';const amt=parseInt(document.getElementById('ni_amt').value)||0;
  const id='INV-'+(9010+state.invoices.length);
  state.invoices.unshift({id,mid,cust,amt,date:'27 Jun now',status:'Open',rcpt:null});
  closeModal();log('🧾 Invoice created · '+id,M(mid).name+' · '+cust+' · '+fmt(amt),'sys');toast('Invoice '+id+' created — open in Reconciliation to match');render();
}
function doLookup(){const v=(document.getElementById('lookupVal').value||'').toLowerCase();const t=state.txns.find(x=>x.id.toLowerCase().indexOf(v)>=0||x.cust.toLowerCase().indexOf(v)>=0)||state.txns[3];const m=M(t.mid);const tk=state.tickets.find(x=>x.txn===t.id);document.getElementById('lookupResult').innerHTML=`<div class="card" style="background:var(--mist)"><div style="display:flex;justify-content:space-between"><span class="mono" style="font-size:12px">${t.id}</span>${pill(t.state)}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;font-size:12.5px">${[['Customer',t.cust],['Merchant',m?m.name:'—'],['Amount',fmt(t.amt)],['Service',t.svc],['Linked ticket',tk?tk.id:'none']].map(r=>`<div><span class="c-mut">${r[0]}: </span><b>${r[1]}</b></div>`).join('')}</div></div>`;log('Support lookup','found '+t.id,'')}
const TOUR=[
 ['customer','c_dispute','① Customer raises a dispute','A customer who did not receive their order fills this form. Submitting creates a ticket and starts a 24-hour clock for the merchant. Click <b>Submit dispute</b>, then press Next.'],
 ['support','s_queue','② Support sees the new ticket','The ticket you just created now appears in the Support queue, prioritised by SLA. Every role that needs to act can see it. Press Next.'],
 ['merchant','m_disputes','③ Merchant must respond','On the merchant side the same dispute shows a respond-by deadline. Ignored for 24h, the amount is auto-held. Open <b>Respond</b> and reject to escalate — or press Next.'],
 ['admin','disputes','④ Admin arbitrates','Unresolved disputes land with Haodapay. Click <b>Manage</b> and choose Approve refund / Hold funds / Reject. Watch the Activity Trail on the right record the result. Press Next.'],
 ['admin','settlement','⑤ Settlement pays the merchant','Now settle a merchant: the row shows Collected − Refunds − Chargebacks − MDF = Net. Click <b>Settle</b>, send the OTP, enter any 6 digits, approve. A UTR is generated. Press Next.'],
 ['merchant','m_settlements','⑥ Merchant sees the payout','The payout you just made appears here with its UTR — the money traced all the way through. Every step was logged in the Activity Trail. Tour complete!'],
];
let tourIx=0;
function startTour(){tourIx=0;showTour()}
function showTour(){const tt=TOUR[tourIx];setRole(tt[0]);go(tt[1]);openModal(`<div style="padding:22px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span class="pill p-violet">Step ${tourIx+1} of ${TOUR.length}</span><button onclick="closeModal()" style="font-size:20px;color:#9aa3b2">✕</button></div><div style="font-weight:700;font-size:17px;margin-bottom:8px">${tt[2]}</div><div style="font-size:13.5px;color:var(--txt2);line-height:1.6">${tt[3]}</div><div style="display:flex;gap:8px;margin-top:18px">${tourIx>0?'<button class="btn btn-soft" onclick="tourIx--;showTour()">← Back</button>':''}<button class="btn btn-soft" onclick="closeModal()">Explore freely</button>${tourIx<TOUR.length-1?'<button class="btn btn-brand" style="margin-left:auto" onclick="tourIx++;showTour()">Next →</button>':'<button class="btn btn-dark" style="margin-left:auto" onclick="closeModal()">Done</button>'}</div></div>`)}
renderTop();renderNav();render();renderTrail();
log('Console ready','Press “Guided walkthrough” to trace a payment end to end','sys');
</script>
